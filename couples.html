<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Couples gallery — Liam Heinrich Photography" />
  <title>Couples — Liam Heinrich Photography</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #0e0e0e;
      --paper: #151515;
      --ink: #f5f5f5;
      --muted: #bdbdbd;
      --accent: #7a1f1f;
      --line: rgba(255,255,255,.08);
      --shadow: 0 20px 40px rgba(0,0,0,.5);

      --max: 1100px;
      --radius: 20px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height:1.65;
    }
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(10,10,10,.85);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .nav{
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      font-family: Fraunces, serif;
      font-weight: 600;
      letter-spacing:.2px;
      font-size: 18px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.25);
      background: transparent;
      color: var(--ink);
      font-size: 14px;
    }
    .btn:hover{transform: translateY(-1px)}
    .btn:active{transform: translateY(0px)}

    .wrap{
      max-width: var(--max);
      margin: 0 auto;
      padding: 26px 18px 80px;
    }

    .pageHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 14px;
      margin: 18px 0 14px;
    }
    .pageHead h1{
      margin:0;
      font-family: Fraunces, serif;
      font-weight: 600;
      font-size: 30px;
      letter-spacing:.2px;
    }
    .pageHead p{
      margin:0;
      color: var(--muted);
      font-size: 14px;
      max-width: 60ch;
    }

    /* Gallery grid */
    .gallery{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }
    .thumb{
      grid-column: span 4;
      border-radius: 16px;
      overflow:hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 10px 22px rgba(0,0,0,.25);
      position:relative;
      cursor:pointer;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .thumb:hover{
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,.45);
      border-color: rgba(255,255,255,.14);
    }
    .thumb img{
      width:100%;
      height: 260px;
      object-fit: cover;
      object-position: center;
      transition: transform .45s ease;
    }
    .thumb:hover img{ transform: scale(1.04); }

    @media (max-width: 900px){
      .thumb{ grid-column: span 6; }
      .thumb img{ height: 220px; }
    }
    @media (max-width: 540px){
      .thumb{ grid-column: span 12; }
      .thumb img{ height: 240px; }
    }

    /* Lightbox */
    .lightbox{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 999;
    }
    .lightbox.isOpen{ display:flex; }

    .lightboxImg{
      user-select:none;
      -webkit-user-drag:none;
      touch-action: pan-y;
      max-width: min(1100px, 92vw);
      max-height: 88vh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .lightboxClose{
      position: absolute;
      top: 16px;
      right: 18px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.35);
      color: white;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
    }
    .lightboxPrev,
    .lightboxNext{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:50px;
      height:50px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.25);
      background:rgba(0,0,0,.35);
      color:white;
      font-size:28px;
      cursor:pointer;
    }
    
    .lightboxPrev{ left:20px; }
    .lightboxNext{ right:20px; }
    
  </style>
</head>

<body>
  <div class="topbar">
    <div class="nav">
      <div class="brand">Liam Heinrich</div>
      <a class="btn" href="index.html#couples-featured">← Back to Couples</a>
    </div>
  </div>

  <main class="wrap">
    <div class="pageHead">
      <div>
        <h1>couples</h1>
        <p>Automotive + environmental storytelling. Click any photo to view.</p>
      </div>
    </div>

    <div class="gallery" id="gallery"></div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightboxClose" type="button">×</button>
  
    <button class="lightboxPrev" type="button">‹</button>
    <img class="lightboxImg" alt="">
    <button class="lightboxNext" type="button">›</button>
  </div>

  <script>
    // 1) Add your 6 images here (must match your filenames)
    const images = Array.from({ length: 6 }, (_, i) => {
      return `images/couples/couples-${i + 1}.jpg`;
    });

    // 2) Build the grid
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = images.map((src) => `
      <button class="thumb" type="button">
        <img src="${src}" alt="couples photo" loading="lazy" decoding="async">
      </button>
    `).join("");

    // Lightbox
    const lb = document.getElementById("lightbox");
    const lbImg = lb.querySelector(".lightboxImg");
    const lbClose = lb.querySelector(".lightboxClose");
    let currentIndex = 0;
    const nextBtn = document.querySelector(".lightboxNext");
    const prevBtn = document.querySelector(".lightboxPrev");

    function openLightbox(index){
      currentIndex = index;
      lbImg.src = images[index];
      lb.classList.add("isOpen");
      lb.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";

      preload((currentIndex + 1) % images.length);
      preload((currentIndex - 1 + images.length) % images.length);
    }

    function closeLightbox(){
      lb.classList.remove("isOpen");
      lb.setAttribute("aria-hidden", "true");
      lbImg.src = "";
      document.body.style.overflow = "";
    }

    // Click thumbnail -> open
    gallery.addEventListener("click", (e) => {
      const img = e.target.closest("img");
      if (!img) return;
    
      const allImages = [...gallery.querySelectorAll("img")];
      const index = allImages.indexOf(img);
    
      openLightbox(index);
    });

    function preload(i){
      const img = new Image();
      img.src = images[i];
    }
    
    function showNext(){
      currentIndex = (currentIndex + 1) % images.length;
      lbImg.src = images[currentIndex];
      preload((currentIndex + 1) % images.length);
    }
    
    function showPrev(){
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      lbImg.src = images[currentIndex];
      preload((currentIndex - 1 + images.length) % images.length);
    }

    nextBtn.addEventListener("click", (e) => { 
      e.stopPropagation();
      showNext();
    });
    
    prevBtn.addEventListener("click", (e) => { 
      e.stopPropagation();
      showPrev();
    });
    
    document.addEventListener("keydown", (e) => {
      if (!lb.classList.contains("isOpen")) return;
    
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") showNext();
      if (e.key === "ArrowLeft") showPrev();
    });
    lb.addEventListener("click", (e) => {
      if (e.target === lb || e.target === lbClose) closeLightbox();
    });
    let touchStartX = 0;
    let touchStartY = 0;
    
    lb.addEventListener("touchstart", (e) => {
      if (!lb.classList.contains("isOpen")) return;
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });
    
    lb.addEventListener("touchend", (e) => {
      if (!lb.classList.contains("isOpen")) return;
      const t = e.changedTouches[0];
    
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
    
      // ignore mostly-vertical swipes (so scrolling doesn't trigger)
      if (Math.abs(dy) > Math.abs(dx)) return;
    
      // minimum swipe distance
      if (Math.abs(dx) < 40) return;
    
      if (dx < 0) showNext();   // swipe left -> next
      else showPrev();          // swipe right -> previous
    }, { passive: true });

    lbClose.addEventListener("click", (e) => {
      e.stopPropagation();
      closeLightbox();
    });
    
  </script>
</body>
</html>
